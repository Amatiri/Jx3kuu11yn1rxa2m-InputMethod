<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>纪释析义码显示转换器</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body {
            background: linear-gradient(135deg, #6a11cb 0%, #2575fc 100%);
            min-height: 100vh;
            padding: 20px;
        }
        .container {
            background-color: rgba(255, 255, 255, 0.95);
            border-radius: 15px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.2);
            padding: 30px;
            margin-top: 20px;
        }
        .header {
            background: linear-gradient(135deg, #6c5ce7, #a29bfe);
            color: white;
            padding: 30px 0;
            margin-bottom: 30px;
            border-radius: 10px;
            text-align: center;
        }
        .instructions {
            background-color: #e9ecef;
            padding: 20px;
            border-radius: 10px;
            margin-bottom: 20px;
        }
        .card {
            margin-bottom: 15px;
            box-shadow: 0 4px 8px rgba(0,0,0,0.1);
            border: none;
            border-radius: 10px;
        }
        .card-header {
            border-radius: 10px 10px 0 0 !important;
        }
        .btn-primary {
            background: linear-gradient(to right, #3498db, #2c3e50);
            border: none;
            border-radius: 50px;
            padding: 10px 25px;
            font-weight: bold;
        }
        .btn-primary:hover {
            background: linear-gradient(to right, #2c3e50, #3498db);
            transform: scale(1.05);
        }
        .back-btn {
            margin-bottom: 20px;
        }
    </style>
</head>
<body>
    <div class="container">
        <a href="{{ url_for('index') }}" class="btn btn-secondary back-btn">返回首页</a>
        
        <div class="header">
            <h1>纪释析义码显示转换器</h1>
            <p class="lead">将便于输入电脑的纪释析义码转换为类手写形式</p>
        </div>

        <div class="instructions">
            <h4>使用说明：</h4>
            <ul>
                <li>输入一串纪释析义码，用空格分隔</li>
                <li>C码将被转换为音调(需要B码符合条件)</li>
                <li>E码将被转换为上标格式</li>
                <li>有效B码包括: a c e g i j m n o p q r s u v w x y z ;</li>
            </ul>
        </div>

        <div class="row">
            <div class="col-md-6">
                <div class="card">
                    <div class="card-header bg-primary text-white">
                        <h5 class="mb-0">输入</h5>
                    </div>
                    <div class="card-body">
                        <form id="processForm">
                            <div class="mb-3">
                                <label for="inputText" class="form-label">输入字符串</label>
                                <textarea class="form-control" id="inputText" rows="5" placeholder="例如: wo3g jn4zw"></textarea>
                            </div>
                            <button type="submit" class="btn btn-primary">转换</button>
                        </form>
                    </div>
                </div>
            </div>

            <div class="col-md-6">
                <div class="card">
                    <div class="card-header bg-success text-white">
                        <h5 class="mb-0">输出结果</h5>
                    </div>
                    <div class="card-body">
                        <div id="outputContainer">
                            <p class="text-muted">转换结果将显示在这里...</p>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        document.getElementById('processForm').addEventListener('submit', function(e) {
            e.preventDefault();
            
            const inputText = document.getElementById('inputText').value;
            
            fetch('/writing/process', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/x-www-form-urlencoded',
                },
                body: new URLSearchParams({
                    'input_text': inputText
                })
            })
            .then(response => response.json())
            .then(data => {
                const outputContainer = document.getElementById('outputContainer');
                outputContainer.innerHTML = '';
                
                if (data.processed.length === 0) {
                    outputContainer.innerHTML = '<p class="text-muted">没有可显示的结果</p>';
                    return;
                }
                
                data.processed.forEach((processedStr, index) => {
                    const card = document.createElement('div');
                    card.className = 'card mb-2';
                    card.innerHTML = `
                        <div class="card-body">
                            <h6 class="card-subtitle mb-1 text-muted">原始: ${data.original[index]}</h6>
                            <p class="card-text mb-0">转换: ${processedStr}</p>
                        </div>
                    `;
                    outputContainer.appendChild(card);
                });
            })
            .catch(error => {
                console.error('Error:', error);
            });
        });
    </script>
</body>
</html>
