<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>纪释析义编码系统</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Microsoft YaHei', sans-serif;
        }
        body {
            background: linear-gradient(135deg, #6a11cb 0%, #2575fc 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        .container {
            background-color: rgba(255, 255, 255, 0.9);
            border-radius: 15px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.2);
            width: 100%;
            max-width: 1000px;
            padding: 30px;
            text-align: center;
        }
        h1 {
            color: #2c3e50;
            margin-bottom: 30px;
            font-size: 2.5rem;
            text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.1);
        }
        .description {
            color: #34495e;
            margin-bottom: 30px;
            line-height: 1.6;
        }
        .card-container {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 25px;
            margin-top: 20px;
        }
        .card {
            background: white;
            border-radius: 12px;
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.1);
            padding: 25px;
            transition: transform 0.3s ease, box-shadow 0.3s ease;
            cursor: pointer;
            display: flex;
            flex-direction: column;
            align-items: center;
            text-align: center;
        }
        .card:hover {
            transform: translateY(-10px);
            box-shadow: 0 15px 30px rgba(0, 0, 0, 0.15);
        }
        .card h2 {
            color: #2c3e50;
            margin-bottom: 15px;
            font-size: 1.5rem;
        }
        .card p {
            color: #7f8c8d;
            margin-bottom: 20px;
            flex-grow: 1;
        }
        .card .icon {
            font-size: 3rem;
            margin-bottom: 15px;
            color: #3498db;
        }
        .btn {
            background: linear-gradient(to right, #3498db, #2c3e50);
            color: white;
            border: none;
            padding: 12px 25px;
            border-radius: 50px;
            font-size: 1rem;
            cursor: pointer;
            transition: all 0.3s ease;
            text-decoration: none;
            display: inline-block;
            font-weight: bold;
            letter-spacing: 1px;
        }
        .btn:hover {
            background: linear-gradient(to right, #2c3e50, #3498db);
            transform: scale(1.05);
        }
        .footer {
            margin-top: 30px;
            color: #7f8c8d;
            font-size: 0.9rem;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>纪释析义编码系统</h1>
        <div class="description">
            <p>本系统用于管理汉字与对应纪释析义码的映射关系</p>
            <p>支持编辑数据、查字和找字功能，以及编码显示转换</p>
        </div>
        
        <div class="card-container">
            <div class="card">
                <div class="icon">📝</div>
                <h2>编辑数据</h2>
                <p>添加、修改或删除汉字与纪释析义码映射关系</p>
                <a href="{{ url_for('edit') }}" class="btn">开始编辑</a>
            </div>
            
            <div class="card">
                <div class="icon">🔍</div>
                <h2>查字功能</h2>
                <p>根据汉字查询对应的纪释析义码</p>
                <a href="{{ url_for('query_char') }}" class="btn">开始查询</a>
            </div>
            
            <div class="card">
              <div class="icon">⌨️</div>
                <h2>输入练习</h2>
                <p>beta网页版输入法</p>
                <a href="{{ url_for('query_prefix') }}" class="btn">开始输入</a>
            </div>
            
            <div class="card">
                <div class="icon">📚</div>
                <h2>规则查询与拓展</h2>
                <p>查看编码规则文档和学习资料</p>
                <a href="{{ url_for('help_files') }}" class="btn">查看文档</a>
            </div>
            
            <div class="card">
                <div class="icon">🔄</div>
                <h2>编码转换器</h2>
                <p>将纪释析义码转换为类手写形式</p>
                <a href="{{ url_for('writing') }}" class="btn">开始转换</a>
            </div>
        </div>
        
        <div class="footer">
            <p>当前数据库条目数: {{ entry_count }}</p>
            <p>© 2025 纪释析义编码系统 | 网页版</p>
        </div>
    </div>
</body>
</html>
